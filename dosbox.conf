[autoexec]
# 挂载MASM目录
mount c C:\JMSOFT\Masm
c:

# 设置路径
set PATH=C:\BIN;C:\INCLUDE;C:\LIB

# 切换到工作目录
mount d d:\CodeBerew\CalcWarrior
d:
cd code

# 显示欢迎信息
echo MASM 6.11 汇编环境已就绪
echo 当前目录: D:\CODE
echo.
echo 可用命令:
echo ml filename.asm - 汇编和链接
echo ml /c filename.asm - 仅汇编
echo link filename.obj - 链接
echo cv filename.exe - 调试
echo.
